name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twa-project

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate signing key
        run: |
          keytool -genkeypair \
            -alias abc-frog \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore app/release-keystore.jks \
            -storepass abcfrog123 -keypass abcfrog123 \
            -dname "CN=GgomziPapa, OU=Dev, O=GgomziPapa, L=Seoul, ST=Seoul, C=KR"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AAB
        run: |
          chmod +x gradlew 2>/dev/null || true
          gradle wrapper
          ./gradlew bundleRelease

      - name: List outputs
        run: find . -name "*.aab" -o -name "*.apk" | head -20

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: abc-frog-aab
          path: twa-project/app/build/outputs/bundle/release/*.aab

      - name: Upload signing key (BACKUP THIS!)
        uses: actions/upload-artifact@v4
        with:
          name: abc-frog-signing-key
          path: twa-project/app/release-keystore.jks
