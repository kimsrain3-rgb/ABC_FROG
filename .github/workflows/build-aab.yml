name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap to use existing JDK and SDK
        run: |
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          cat "$HOME/.bubblewrap/config.json"

      - name: Initialize TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          yes "" | bubblewrap init --manifest="https://kimsrain3-rgb.github.io/ABC_FROG/manifest.json" --packageId="com.ggomzipapa.abcfrog"

      - name: Build AAB
        run: |
          cd twa-build
          bubblewrap build --skipPwaValidation --signingMode=new --keyStorePassword=abcfrog123 --keyPassword=abcfrog123 --keyAlias=abc-frog

      - name: List output files
        run: |
          echo "=== twa-build root ==="
          ls -la twa-build/*.aab twa-build/*.apk 2>/dev/null || echo "No aab/apk in root"
          echo "=== app build outputs ==="
          find twa-build -name "*.aab" -o -name "*.apk" 2>/dev/null || echo "No files found"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: abc-frog-aab
          path: |
            twa-build/*.aab
            twa-build/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

      - name: Upload signing key (backup)
        uses: actions/upload-artifact@v4
        with:
          name: abc-frog-signing-key
          path: twa-build/android.keystore
          if-no-files-found: warn
