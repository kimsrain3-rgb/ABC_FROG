name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twa-project

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate signing key
        run: |
          keytool -genkeypair \
            -alias abc-frog \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore app/release-keystore.jks \
            -storepass abcfrog123 -keypass abcfrog123 \
            -dname "CN=GgomziPapa, OU=Dev, O=GgomziPapa, L=Seoul, ST=Seoul, C=KR"

      - name: Create Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.5
        env:
          GRADLE_VERSION: 8.5

      - name: Build AAB
        run: ./gradlew bundleRelease --no-daemon

      - name: List outputs
        if: always()
        run: find . -name "*.aab" -o -name "*.apk" 2>/dev/null | head -20

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: abc-frog-aab
          path: twa-project/app/build/outputs/bundle/release/*.aab

      - name: Upload signing key (BACKUP THIS!)
        uses: actions/upload-artifact@v4
        with:
          name: abc-frog-signing-key
          path: twa-project/app/release-keystore.jks
