plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ggomzipapa.abcfrog'
    compileSdk 35

    defaultConfig {
        applicationId "com.ggomzipapa.abcfrog"
        minSdk 24
        targetSdk 35
        versionCode 5
        versionName "1.0.4"
    }

    signingConfigs {
        release {
            storeFile file("release-keystore.jks")
            storePassword "abcfrog123"
            keyAlias "abc-frog"
            keyPassword "abcfrog123"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
