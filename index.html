<!DOCTYPE html>
<html lang="ko">
<head>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ABC Frog</title>
<link rel="stylesheet" href="style.css">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VEN3PCFXXL"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-VEN3PCFXXL');</script>
</head>
<body>
<div id="gc">
  <div class="ss" id="ss">
    <div class="sf"><img class="sf-a" src="assets/images/frog_4a.png" alt="ABC Frog"><img class="sf-b" src="assets/images/frog_4b.png" alt="ABC Frog"></div>
    <h1>ABC Frog</h1>
    <div class="sub">I'm hungry~</div>
    <div class="mode-buttons">
      <button class="mbtn mbtn-abc" onclick="go('ABC')">
        <span class="mbtn-label">ABC</span>
      </button>
      <button class="mbtn mbtn-lower" onclick="go('abc')">
        <span class="mbtn-label">abc</span>
      </button>
      <button class="mbtn mbtn-mix" onclick="go('ABc')">
        <span class="mbtn-label">ABc</span>
      </button>
    </div>
  </div>
  <div class="sc" id="sc">🌟 0</div>
  <div class="cb" id="cb"></div>
  <div class="bubble" id="bbl"></div>

  <div class="lilypad"><img src="assets/images/lilypad.png" alt="lilypad"></div>
  <div class="stump"><img src="assets/images/bg_5-1.png" alt="stump"></div>

  <div class="frog" id="frog">
    <!-- 5단계 개구리 (각 단계: a=숨쉬기A, b=숨쉬기B, open=입벌림) -->
    <!-- 1단계 (홀쭉) -->
    <img id="fs1a" class="frog-img active" src="assets/images/frog_1a.png" alt="frog1a" data-stage="1" data-pose="a">
    <img id="fs1b" class="frog-img" src="assets/images/frog_1b.png" alt="frog1b" data-stage="1" data-pose="b">
    <img id="fs1o" class="frog-img" src="assets/images/frog_1_open.png" alt="frog1open" data-stage="1" data-pose="open">
    <img id="fs1y" class="frog-img" src="assets/images/frog_1_yuck.png" alt="frog1yuck" data-stage="1" data-pose="yuck">
    <!-- 2단계 (조금) -->
    <img id="fs2a" class="frog-img" src="assets/images/frog_2a.png" alt="frog2a" data-stage="2" data-pose="a">
    <img id="fs2b" class="frog-img" src="assets/images/frog_2b.png" alt="frog2b" data-stage="2" data-pose="b">
    <img id="fs2o" class="frog-img" src="assets/images/frog_2b_open.png" alt="frog2open" data-stage="2" data-pose="open">
    <img id="fs2y" class="frog-img" src="assets/images/frog_2_yuck.png" alt="frog2yuck" data-stage="2" data-pose="yuck">
    <!-- 3단계 (통통) -->
    <img id="fs3a" class="frog-img" src="assets/images/frog_3a.png" alt="frog3a" data-stage="3" data-pose="a">
    <img id="fs3b" class="frog-img" src="assets/images/frog_3b.png" alt="frog3b" data-stage="3" data-pose="b">
    <img id="fs3o" class="frog-img" src="assets/images/frog_3_open.png" alt="frog3open" data-stage="3" data-pose="open">
    <img id="fs3y" class="frog-img" src="assets/images/frog_3_yuck.png" alt="frog3yuck" data-stage="3" data-pose="yuck">
    <!-- 4단계 (뚜뚜) -->
    <img id="fs4a" class="frog-img" src="assets/images/frog_4a.png" alt="frog4a" data-stage="4" data-pose="a">
    <img id="fs4b" class="frog-img" src="assets/images/frog_4b.png" alt="frog4b" data-stage="4" data-pose="b">
    <img id="fs4o" class="frog-img" src="assets/images/frog_4_open.png" alt="frog4open" data-stage="4" data-pose="open">
    <img id="fs4y" class="frog-img" src="assets/images/frog_4_yuck.png" alt="frog4yuck" data-stage="4" data-pose="yuck">
    <!-- 5단계 (만삭) -->
    <img id="fs5a" class="frog-img" src="assets/images/frog_5a.png" alt="frog5a" data-stage="5" data-pose="a">
    <img id="fs5b" class="frog-img" src="assets/images/frog_5b.png" alt="frog5b" data-stage="5" data-pose="b">
    <img id="fs5o" class="frog-img" src="assets/images/frog_5_open.png" alt="frog5open" data-stage="5" data-pose="open">
    <img id="fs5y" class="frog-img" src="assets/images/frog_5_yuck.png" alt="frog5yuck" data-stage="5" data-pose="yuck">
  </div>

  <div class="tongue" id="tng"></div>
  <div id="fc"></div>
  <div class="cbar" id="cb2"></div>
</div>

<script src="script.js"></script>
</body>
</html>
