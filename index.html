<!DOCTYPE html>
<html lang="ko">
<head>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ABC Frog</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="gc">
  <div class="ss" id="ss">
    <img class="sf" src="assets/images/start_frog.png" alt="ABC Frog">
    <h1>ABC Frog</h1>
    <div class="sub">I'm hungry~</div>
    <button class="sbtn" onclick="go()">START</button>
  </div>
  <div class="sc" id="sc">🌟 0</div>
  <div class="cb" id="cb"></div>
  <div class="bubble" id="bbl"></div>

  <div class="lilypad"><img src="assets/images/lilypad.png" alt="lilypad"></div>

  <div class="frog" id="frog">
    <!-- 정면 애니메이션 4장 -->
    <img id="fa_base" class="active" src="assets/images/frog_base.png" alt="base">
    <img id="fa_half" src="assets/images/frog_half.png" alt="halfblink">
    <img id="fa_blink" src="assets/images/frog_blink.png" alt="blink">
    <img id="fa_breathe" src="assets/images/frog_breathe.png" alt="breathe">
    <!-- 옆면 (혀 쏘기용) -->
    <img id="fa_side" src="assets/images/frog_side.png" alt="side">
    <img id="fa_open" src="assets/images/frog_open.png" alt="open">
  </div>

  <div class="tongue" id="tng"></div>
  <div id="fc"></div>
  <div class="cbar" id="cb2"></div>
</div>

<script src="script.js"></script>
</body>
